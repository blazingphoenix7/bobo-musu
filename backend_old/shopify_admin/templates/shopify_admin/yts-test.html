{% extends 'shopify_admin/base.html' %}

{% block content %}
    {{ data.movie_count }}
    <div class="container">
        <div class="row">
            {% for movie in data.movies %}
                <div class="col-6 col-md-4">
                    <div class="card mb-2">

                        <div class="card-body p-0 text-center">
                            <img src="{{ movie.medium_cover_image }}" class="img-fluid" alt=
                                    "{{ movie.title_long }}" style="max-height: 345px">
                            <h4 class="mt-2">{{ movie.title_long }}</h4>
                        </div>
                        <div class="d-flex w-100 text-center my-2 justify-content-center align-items-center">
                            {% for torrent in movie.torrents %}
                                <a class="btn btn-sm btn-dark mr-1" href="{{ torrent.url }}">{{ torrent.quality }}</a>
                            {% endfor %}
                        </div>

                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
